"$schema" = 'https://starship.rs/config-schema.json'

format = """$username$hostname$directory$git_branch$git_state$git_status$character"""

[directory]
style = "blue"
truncation_length = 5
truncate_to_repo = true
read_only = " [ro]"
truncation_symbol = ".../"

[line_break]
disabled = true

[character]
success_symbol = "[>](purple)"
error_symbol = "[>](red)"
vimcmd_symbol = "[<](green)"

[git_branch]
format = "[$branch]($style) "
style = "bright-black"

[git_status]
style = "cyan"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"
